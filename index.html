<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Modules Quiz</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9fafb;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .quiz-card {
            background: white;
            max-width: 650px;
            width: 100%;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        h2 {
            color: #1f2937;
            margin-top: 0;
            margin-bottom: 20px;
        }
        .topic-selector {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border-radius: 6px;
            border: 1px solid #d1d5db;
            margin-bottom: 25px;
            background-color: #fff;
        }
        .question-block {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f3f4f6;
        }
        .question-text {
            font-weight: 600;
            margin-bottom: 12px;
            color: #374151;
        }
        .option-label {
            display: block;
            padding: 12px;
            margin: 6px 0;
            background: #f3f4f6;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .option-label:hover {
            background: #e5e7eb;
        }
        .submit-btn {
            background-color: #16a34a;
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        .submit-btn:hover {
            background-color: #15803d;
        }
        
        /* Success Screen Container exactly matching image_f93a68.png */
        #success-container {
            display: none; 
            text-align: center; 
            background-color: #e6f4ea; 
            padding: 50px 30px; 
            border-radius: 8px;
            width: 100%;
            max-width: 700px;
        }
        .success-title {
            color: #13522b; 
            font-size: 26px; 
            font-weight: 700; 
            margin-bottom: 25px;
            letter-spacing: -0.5px;
        }
        .success-score {
            color: #13522b; 
            font-size: 42px; 
            font-weight: 800; 
            margin-bottom: 25px;
        }
        .success-text {
            color: #13522b; 
            font-size: 18px; 
            font-weight: 500;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <!-- MAIN QUIZ INTERFACE -->
    <div id="quiz-container" class="quiz-card">
        <h2>Select Module Topic:</h2>
        <select id="topicDropdown" class="topic-selector" onchange="loadQuizTopic()">
            <option value="topic1">Topic 1: Introduction & Data Management</option>
            <option value="topic2">Topic 2: Study Designs</option>
            <option value="topic3">Topic 3: Sampling & Prevalence</option>
            <option value="topic4">Topic 4: Cohort & Longitudinal Analysis</option>
            <option value="topic5">Topic 5: Regression Modeling</option>
            <option value="topic6">Topic 6: Integration & Reporting</option>
        </select>

        <form id="quizForm" onsubmit="calculateAndSubmit(event)">
            <!-- Questions will dynamically load here -->
            <div id="questionsWrapper"></div>
            <button type="submit" class="submit-btn">Submit Answers</button>
        </form>
    </div>

    <!-- SILENT SUBMISSION TARGET -->
    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

    <!-- SUCCESS SCREEN CONTAINER MATCHING image_f93a68.png -->
    <div id="success-container">
        <div class="success-title">Quiz Completed Successfully!</div>
        <div id="score-display" class="success-score">Score: 0 / 10 (100%)</div>
        <div class="success-text">
            Your answers have been securely logged into the course directors database.
        </div>
    </div>

    <script>
        // 1. Centralized Form Configuration Routing
        const topicConfig = {
            topic1: {
                formId: "1FAIpQLSc73LAdSXamCN8fNnflvmsE61CY1LqKpyzFe4zt_rzEO8bcGg",
                scoreEntryId: "entry.111111111", // Replace with pre-filled ID for Topic 1 Score
                percentEntryId: "entry.222222222",
                answerKey: { q1: "B", q2: "A" },
                questions: [
                    { id: "q1", text: "1. Which software is highly optimized for cleaning data frames and building clinical visuals?", options: { A: "SPSS", B: "R Language", C: "Excel" } },
                    { id: "q2", text: "2. Missing data verification happens at which main analysis stage?", options: { A: "Data Cleaning", B: "Model Fitting", C: "Abstract Drafting" } }
                ]
            },
            topic2: {
                formId: "1FAIpQLSdBhIduHUOf8TSCjts2_Eexjx_IiBwVDc0BRuuUZnmHIYzbVQ",
                scoreEntryId: "entry.333333333", // Replace with pre-filled ID for Topic 2 Score
                percentEntryId: "entry.444444444",
                answerKey: { q1: "C", q2: "B" },
                questions: [
                    { id: "q1", text: "1. What is the standard design for mapping longitudinal clinical paths over 48 months?", options: { A: "Cross-Sectional", B: "Ecological", C: "Prospective Cohort" } },
                    { id: "q2", text: "2. Retrospective chart audits are primarily dependent on what trait?", options: { A: "Prospectively tracked logs", B: "Historical records registry", C: "Real-time clinical observation" } }
                ]
            },
            topic3: {
                formId: "1FAIpQLSdYNBB-uxwrcRSB3i2jdUus5eEIewSeFSeoz6XMf4yVt294LA",
                scoreEntryId: "entry.555555555",
                percentEntryId: "entry.666666666",
                answerKey: { q1: "A" },
                questions: [
                    { id: "q1", text: "1. Prevalence measures the proportion of a population affected by a condition at a specific point in time.", options: { A: "True", B: "False" } }
                ]
            },
            topic4: {
                formId: "1FAIpQLSfeVNra8ePCurnGV54KIobxqL2mFycvn7-s8SlcOKQn1cUMCA",
                scoreEntryId: "entry.777777777",
                percentEntryId: "entry.888888888",
                answerKey: { q1: "B" },
                questions: [
                    { id: "q1", text: "1. Person-years calculation represents what metric denominator?", options: { A: "Total crude head count", B: "Cumulative observation time at risk", C: "Median calendar years elapsed" } }
                ]
            },
            topic5: {
                formId: "1FAIpQLSfgqRQqBjW8f6z80aTXJm1EuvTRZR3y4wRYNcKokCymDux8OA",
                scoreEntryId: "entry.999999999",
                percentEntryId: "entry.000000000",
                answerKey: { q1: "A" },
                questions: [
                    { id: "q1", text: "1. Which regression family is used when outcomes are categorized binary variables (e.g., Success vs Failure)?", options: { A: "Logistic Regression", B: "Linear Regression", C: "Poisson" } }
                ]
            },
            topic6: {
                formId: "1FAIpQLSeJxMP3d2ZizVUWNrqp99NvcHhF7WihwGmukiDLFljZXwJajQ",
                scoreEntryId: "entry.121212121",
                percentEntryId: "entry.343434343",
                answerKey: { q1: "C" },
                questions: [
                    { id: "q1", text: "1. When reporting clinical outcomes to external evaluation monitors, transparency requires declaring what?", options: { A: "Only positive trends", B: "Anecdotal assumptions", C: "Both confidence intervals and point estimates" } }
                ]
            }
        };

        // 2. Render Questions Dynamically based on Selection
        function loadQuizTopic() {
            const currentTopic = document.getElementById("topicDropdown").value;
            const config = topicConfig[currentTopic];
            const container = document.getElementById("questionsWrapper");
            
            container.innerHTML = ""; // Clear existing

            config.questions.forEach(q => {
                let questionHTML = `
                    <div class="question-block">
                        <p class="question-text">${q.text}</p>
                `;
                for (let key in q.options) {
                    questionHTML += `
                        <label class="option-label">
                            <input type="radio" name="${q.id}" value="${key}" required> ${q.options[key]}
                        </label>
                    `;
                }
                questionHTML += `</div>`;
                container.insertAdjacentHTML('beforeend', questionHTML);
            });
        }

        // 3. Mark Answers & Submit Behind the Scenes
        function calculateAndSubmit(event) {
            event.preventDefault();

            const currentTopic = document.getElementById("topicDropdown").value;
            const config = topicConfig[currentTopic];
            const formElement = document.getElementById('quizForm');
            const formData = new FormData(formElement);
            
            let totalQuestions = Object.keys(config.answerKey).length;
            let score = 0;

            // Grade Answers
            for (let key in config.answerKey) {
                if (formData.get(key) === config.answerKey[key]) {
                    score++;
                }
            }
            
            let percentage = Math.round((score / totalQuestions) * 100);

            // Hide Selector UI & Reveal image_f93a68.png Match Card
            document.getElementById("quiz-container").style.display = "none";
            document.getElementById("score-display").innerText = `Score: ${score} / ${totalQuestions} (${percentage}%)`;
            document.getElementById("success-container").style.display = "block";

            // Push Background payload to matching Google Form target link
            sendToGoogleForm(config, score, totalQuestions, percentage);
        }

        function sendToGoogleForm(config, score, total, percent) {
            const formBaseURL = `https://docs.google.com/forms/d/e/${config.formId}/formResponse`;
            
            const trackingForm = document.createElement('form');
            trackingForm.method = 'POST';
            trackingForm.action = formBaseURL;
            trackingForm.target = 'hidden_iframe'; // Halts page navigation redirects

            // Inject Score Column Data 
            const scoreInput = document.createElement('input');
            scoreInput.type = 'hidden';
            scoreInput.name = config.scoreEntryId; 
            scoreInput.value = `${score} / ${total}`;
            trackingForm.appendChild(scoreInput);

            // Inject Percentage Column Data
            const percentInput = document.createElement('input');
            percentInput.type = 'hidden';
            percentInput.name = config.percentEntryId; 
            percentInput.value = `${percent}%`;
            trackingForm.appendChild(percentInput);

            document.body.appendChild(trackingForm);
            trackingForm.submit();
            document.body.removeChild(trackingForm);
        }

        // Init on first boot
        window.onload = loadQuizTopic;
    </script>
</body>
</html>
